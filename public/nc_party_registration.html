  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {

  html, body {

    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--ink);
  }

  body {
    display: flex; flex-direction: column; align-items: center;
    padding: 2rem 1rem 3rem;
  }

  header {
    text-align: center;
    border-bottom: 2px solid var(--rule);
    padding-bottom: 1rem;
    margin-bottom: 0.4rem;
    width: 100%; max-width: 1000px;
  }

  header p.dateline {

    font-weight: 900; line-height: 1.1;
    letter-spacing: -0.02em;
  }

  header p.sub {
    margin-top: 0.5rem; font-size: 0.88rem; font-style: italic; color: #5a4e3a;
  }

  #map-wrap {
    position: relative;
    width: 100%; max-width: 1000px;
    background: var(--paper);
    border: 1px solid var(--rule);
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
  }

  svg#map {
    width: 100%; height: auto;
    display: block;
  }

  .county-base {
    fill: #ede9df;
    stroke: #b0a080;
    stroke-width: 0.5;
    transition: filter 0.15s;
    cursor: pointer;
  }
  .county-base:hover { filter: brightness(0.88); }

  /* Tooltip */
  #tip {
    position: fixed;
    pointer-events: none;
    background: var(--paper);
    border: 1px solid var(--rule);
    box-shadow: 3px 4px 14px rgba(0,0,0,0.18);
    padding: 0.7rem 0.9rem;
    font-size: 0.82rem;
    max-width: 250px;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 99;
  }
  #tip.show { opacity: 1; }
  #tip h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; margin-bottom: 0.4rem;
    border-bottom: 1px solid var(--rule); padding-bottom: 0.3rem;
  }
  #tip table { width: 100%; border-collapse: collapse; }
  #tip td { padding: 1px 4px; }
  #tip .swatch {
    display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; margin-right: 4px; vertical-align: middle;
  }
  #tip .num { text-align: right; font-variant-numeric: tabular-nums; }
  #tip .pct { text-align: right; color: #7a6e5a; font-size: 0.75rem; }
  #tip .total-row td { border-top: 1px solid var(--rule); font-weight: 600; padding-top: 3px; }

  /* Legend */
  #legend {
    display: flex; gap: 1.4rem; flex-wrap: wrap;
    justify-content: center;
    margin-top: 1rem;
    font-size: 0.82rem;
  }
  .leg-item { display: flex; align-items: center; gap: 0.35rem; }
  .leg-swatch {
    width: 14px; height: 14px; border-radius: 3px;
  }

  footer {
    margin-top: 1.2rem;
    font-size: 0.72rem; color: #9a8a72; font-style: italic;
    text-align: center;
  }
</style>

// ── load TopoJSON, project, draw ─────────────────────────────────────────────
const SVG_W = 1200, SVG_H = 500;

async function main() {
  const topo = await fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')
    .then(r => r.json());

  const counties = topojson.feature(topo, topo.objects.counties);

  // NC bounding box in albers-projected pixel space (roughly)
  // We'll compute a manual bounding box from NC features then transform
  const ncFeatures = counties.features.filter(f => ncFipsSet.has(f.id));

  // Simple equirectangular-ish projection tuned to NC
  // NC roughly: lon -84.3 to -75.5, lat 33.8 to 36.6
  const lonMin=-84.4, lonMax=-75.4, latMin=33.75, latMax=36.65;
  const PAD = 20;
  function project([lon,lat]) {
    const x = PAD + (lon - lonMin)/(lonMax - lonMin) * (SVG_W - 2*PAD);
    const y = PAD + (latMax - lat)/(latMax - latMin) * (SVG_H - 2*PAD);
    return [x, y];
  }

  function pathFromFeature(feature) {
    const coords = feature.geometry.type === 'Polygon'
      ? [feature.geometry.coordinates]
      : feature.geometry.coordinates;
    // coords is array-of-polygons, each polygon is array-of-rings
    let d = '';
    for (const poly of coords) {
      for (let ri = 0; ri < poly.length; ri++) {
        const ring = poly[ri];
        // ring is [[lon,lat], ...]
        d += ring.map((pt, i) => {
          const [x,y] = project(pt);
          return (i===0?'M':'L') + x.toFixed(2) + ',' + y.toFixed(2);
        }).join('') + 'Z';
      }
    }
    return d;
  }

    // average of all vertices
    let xs=0, ys=0, n=0;
    const coords = feature.geometry.type === 'Polygon'
      ? [feature.geometry.coordinates]
      : feature.geometry.coordinates;
    for (const poly of coords) {
      for (const ring of poly) {
        for (const pt of ring) {
          const [x,y] = project(pt);
          xs+=x; ys+=y; n++;
        }
      }
    }
    return [xs/n, ys/n];
  }

    path.setAttribute('d', pathFromFeature(feat));
    path.setAttribute('class','county-base');
    baseGroup.appendChild(path);

    if (!rec) continue;

    const [cx, cy] = centroid(feat);
    const total = rec.dem + rec.rep + rec.una + rec.oth;
    const r = Math.max(3, BASE_R * Math.sqrt(total/maxTotal));

    // draw pie
    const slices = [
      {key:'dem', val:rec.dem},
      {key:'rep', val:rec.rep},
      {key:'una', val:rec.una},
      {key:'oth', val:rec.oth},
    ];

    let startAngle = -Math.PI/2;
    for (const sl of slices) {
      const frac = sl.val / total;
      const sweep = frac * 2 * Math.PI;
      const endAngle = startAngle + sweep;

      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = sweep > Math.PI ? 1 : 0;

      const wedge = document.createElementNS(ns,'path');
      const d = frac > 0.999
        ? `M${cx},${cy} m${-r},0 a${r},${r} 0 1,0 ${2*r},0 a${r},${r} 0 1,0 ${-2*r},0`
        : `M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${largeArc},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z`;
      wedge.setAttribute('d', d);
      wedge.setAttribute('fill', COLORS[sl.key]);
      wedge.setAttribute('stroke','#faf7f2');
      wedge.setAttribute('stroke-width','0.6');
      pieGroup.appendChild(wedge);

      startAngle = endAngle;
    }

    // invisible hit circle for tooltip
    const hit = document.createElementNS(ns,'circle');
    hit.setAttribute('cx', cx); hit.setAttribute('cy', cy);
    hit.setAttribute('r', Math.max(r+2, 8));
    hit.setAttribute('fill','transparent');
    hit.setAttribute('style','cursor:pointer');
    hit.dataset.rec = JSON.stringify(rec);
    hit.dataset.total = total;
    pieGroup.appendChild(hit);

    // tooltip events
    hit.addEventListener('mousemove', e => {
      const d = JSON.parse(hit.dataset.rec);
      const tot = parseInt(hit.dataset.total);
      const pct = v => (v/tot*100).toFixed(1)+'%';
      const fmt = v => v.toLocaleString();
      tip.innerHTML = `
        <h3>${d.name} County</h3>
        <table>
          <tr><td><span class="swatch" style="background:${COLORS.dem}"></span>Democrat</td>
              <td class="num">${fmt(d.dem)}</td><td class="pct">${pct(d.dem)}</td></tr>
          <tr><td><span class="swatch" style="background:${COLORS.rep}"></span>Republican</td>
              <td class="num">${fmt(d.rep)}</td><td class="pct">${pct(d.rep)}</td></tr>
          <tr><td><span class="swatch" style="background:${COLORS.una}"></span>Unaffiliated</td>
              <td class="num">${fmt(d.una)}</td><td class="pct">${pct(d.una)}</td></tr>
          <tr><td><span class="swatch" style="background:${COLORS.oth}"></span>Other</td>
              <td class="num">${fmt(d.oth)}</td><td class="pct">${pct(d.oth)}</td></tr>
          <tr class="total-row"><td>Total</td>
              <td class="num" colspan="2">${fmt(tot)}</td></tr>
        </table>`;
      tip.classList.add('show');
      positionTip(e);
    });
    hit.addEventListener('mousemove', positionTip);
    hit.addEventListener('mouseleave', () => tip.classList.remove('show'));
  }
}

function positionTip(e) {
  const tip = document.getElementById('tip');
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 240 > window.innerWidth) x = e.clientX - 240;
  if (y + 200 > window.innerHeight) y = e.clientY - 200;
  tip.style.left = x+'px';
  tip.style.top  = y+'px';
}

main();
</script>
</body>
</html>
